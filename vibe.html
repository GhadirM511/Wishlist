<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick a Vibe - Detailed</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@800&family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* 1. التصفير الشامل لضمان عدم وجود فواصل */
        * { 
            box-sizing: border-box; 
            margin: 0 !important; 
            padding: 0 !important; 
        }
        
        body, html { 
            height: 100%; 
            font-family: 'Roboto', sans-serif; 
            overflow: hidden; 
        }

        /* 2. النفيقيشن بار المعتمد (يسار + أخضر زيتي) */
        .navbar {
            background-color: #d2b48c !important; /* البيج الرملي */
            padding: 15px 50px !important;
            display: flex;
            justify-content: flex-start !important; /* الروابط يسار */
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10000;
            border: none !important;
            box-shadow: none !important;
        }

        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
        }
.nav-links a {  
    text-decoration: none;
    color: #213315 !important;
    font-family: 'Playfair Display', serif !important; /* الخط المطلوب */
    font-weight: 800 !important;
    font-size: 18px !important;
    text-transform: uppercase;
    transition: 0.3s ease;
}

        .nav-links a:hover {
            color: #f6f5dc !important; /* يقلب بيج فاتح */
            border: none !important;
        }

        /* 3. حاوية المحتوى والخلفية */
        .vibe-container {
            height: 100vh;
            width: 100%;
            background-image: url('backg.jpg'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-top: 80px;
        }

        /* 4. العنوان */
        .vibe-title {
            font-family: 'Playfair Display', serif;
            color: #f6f5dc;
            font-size: 45px;
            font-weight: 800;
            margin-bottom: 40px !important;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* 5. البورد البيج (الكارد) */
        .vibe-board {
            background-color: #f5f2a8;
            border-radius: 45px;
            width: 90%;
            max-width: 850px;
            padding: 60px 40px !important; /* رجعنا المسافات داخل البورد */
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .vibe-grid { 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            flex-wrap: wrap; 
        }

        /* 6. الكروت الخضراء الصغيرة */
        .vibe-card-green {
            width: 200px; 
            height: 250px; 
            background-color: #8da16c; 
            border-radius: 30px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px !important;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .vibe-card-green:hover { 
            transform: translateY(-10px);
            background-color: #718355; 
        }

        .image-holder {
            width: 100%;
            height: 160px; 
            background-color: rgba(255,255,255,0.2); 
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px !important;
        }

        .image-holder img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .vibe-card-green p {
            font-family: 'Playfair Display', serif; /* توحيد الخط */
            color: #f6f5dc; 
            font-size: 20px; 
            font-weight: 800;
            margin-top: auto !important;
            text-align: center;
        }
    </style>
</head>
<body>


    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="abt.html">About us</a></li>
            <li><a href="vibe.html">Add ur wish list</a></li>
            <li><a href="ins.html">Inspired</a></li>
        </ul>
    </nav>

<div class="vibe-container">
    <h1 class="vibe-title">Pick a vibe FIRST !</h1>

    <div class="vibe-board">
        <div class="vibe-grid">
            
            <div class="vibe-card-green" onclick="window.location.href='travle.html'">
                <div class="image-holder">
                    <img src="travle.jpg" alt="Travel">
                </div>
                <p>Travel</p>
            </div>

            <div class="vibe-card-green" onclick="window.location.href='creativity.html'">
                <div class="image-holder">
                    <img src="creativity.jpg" alt="Creativity">
                </div>
                <p>Creativity</p>
            </div>

            <div class="vibe-card-green" onclick="window.location.href='growth.html'">
                <div class="image-holder">
                    <img src="growth.jpg" alt="Growth">
                </div>
                <p>Growth</p>
            </div>

        </div>
    </div>
</div>

</body>
</html>
